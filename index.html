<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaqal Ciidka Qoyska - Ciid Mubaarak!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top center, #fffdf8, #f4ecd8);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54.627 0l.83.83-1.66 1.66-.83-.83.83-.83zM27.314 0l.83.83-1.66 1.66-.83-.83.83-.83z' fill='%23d4af37' fill-opacity='0.15' fill-rule='evenodd'/%3E%3C/svg%3E");
            color: #333;
            text-align: center;
            margin: 0;
            padding: 40px 20px; /* Waxaan kordhiyay padding-ka si border-ku u muuqdo */
            direction: ltr;
            min-height: 100vh;
            position: relative;
            box-sizing: border-box;
        }

        /* Xudduudda Qurxoon (The Elegant Border) */
        body::before {
            content: "";
            position: fixed;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
            border: 6px double #d4af37; /* Dahabi qaro weyn oo laba xariiq ah */
            border-radius: 20px;
            pointer-events: none; /* Si aanu u hor istaagin in sanduuqa la riixo */
            z-index: 1000;
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.2), 0 0 15px rgba(212, 175, 55, 0.4);
        }

        /* Qurxinta Geesaha (Corner Ornaments) */
        body::after {
            content: "✨";
            position: fixed;
            top: 25px;
            left: 25px;
            font-size: 24px;
            pointer-events: none;
            z-index: 1001;
            color: #d4af37;
            text-shadow: calc(100vw - 80px) 0 0 #d4af37, 
                         0 calc(100vh - 80px) 0 #d4af37, 
                         calc(100vw - 80px) calc(100vh - 80px) 0 #d4af37;
        }

        h1 {
            color: #2c5e3b;
            font-size: 2.8em;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            position: relative;
            z-index: 10;
        }
        .subtitle {
            color: #b8860b;
            font-size: 1.3em;
            margin-bottom: 30px;
            font-weight: bold;
            position: relative;
            z-index: 10;
        }
        .mother-section {
            background: linear-gradient(135deg, #d4af37, #f9f1d8);
            border: 3px solid #b8962e;
            border-radius: 15px;
            padding: 20px;
            margin: 0 auto 40px auto;
            max-width: 600px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: transform 0.2s;
            position: relative;
            z-index: 10;
        }
        .mother-section:hover {
            transform: scale(1.03);
        }
        .mother-text {
            font-size: 1.6em;
            font-weight: bold;
            color: #2c5e3b;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            padding-bottom: 30px;
        }
        .box {
            background: linear-gradient(135deg, #2c5e3b, #1e4028);
            color: white;
            border-radius: 12px;
            padding: 30px 20px;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 120px;
            border: 2px solid #1e4028;
        }
        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .box.challenge-state {
            background: linear-gradient(135deg, #e67e22, #d35400);
            border: 2px solid #b84a00;
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(230, 126, 34, 0.4);
        }
        .box.challenge-state:hover {
            transform: scale(1.05);
        }
        .box.opened {
            background: #e0e0e0;
            color: #444;
            cursor: default;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
            border: 2px solid #ccc;
            transform: none;
        }
        .box.opened:hover {
            transform: none;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }
        .small-text {
            font-size: 0.8em;
            color: #ffd700;
            margin-top: 10px;
        }
        .challenge-state .small-text {
            color: #fff;
            font-weight: bold;
        }
        .opened .small-text {
            color: #666;
        }
    </style>
</head>
<body>

    <h1>🌙 CIID MUBAARAK! ✨</h1>
    <div class="subtitle">Soo dhawaada, maanta waa maalintii farxadda iyo xaqal ciidka, qof walba nasiib wacan! 🎈</div>

    <div class="mother-section" id="hooyoBox" onclick="openHooyo()">
        <div class="mother-text" id="hooyoContent">Hooyo Macaan ❤️ (Halkan taabo)</div>
    </div>

    <hr style="border: 1px dashed #d4af37; max-width: 800px; margin-bottom: 30px; position: relative; z-index: 10;">

    <div class="grid-container" id="gameBoard">
        </div>

    <script>
        // Hooyo Logic
        let hooyoOpened = false;
        function openHooyo() {
            if (!hooyoOpened) {
                document.getElementById('hooyoContent').innerHTML = "✨ Ciid Mubaarak Hooyo Macaan! ✨<br><br>Adigu tartan kuma jirtid, xaqal ciidkaaguna waa diyaar. <br><br>Waan ku jecelahay Hooyo! ❤️";
                hooyoOpened = true;
                
                // Rashka Hooyo (Dahabi iyo Cagaar)
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.6 },
                    colors: ['#d4af37', '#2c5e3b', '#ffffff']
                });
            }
        }

        // Data for the 11 people
        const prizesData = [
            { challenge: "Waji faraxsan samee, kadib taabo mar kale! 😊", prize: "Nasiib wacan! Waxaad heshay <strong>10,000 SL SH</strong>. Waa lacag yar balse barako badan, qabooji niyada walaal! ✨" },
            { challenge: "Qofka ku xiga u sheeg hal shay oo aad ku jeceshahay, kadib fur! 🤝", prize: "Hambalyo! Waxaad heshay <strong>15,000 SL SH</strong>. Xoogaa waad dhaantaa kuwo kale ee ku farax! 🌸" },
            { challenge: "U ducee Hooyo duco dheer oo qurxoon, kadib fur! 🤲", prize: "Waaaw! 🌟 Maanta adigaa ugu nasiib badan! Waxaad heshay <strong>40,000 SL SH!</strong> 💸 🎉 <br><br><em>Lakiin nasiib wanaagsane... jaarkaaga ka warsug kkkk 😂</em>" },
            { challenge: "Qosol weyn samee kkkk, kadib fur! 😂", prize: "Hambalyo! Asal ahaan waxaad heshay 10,000 SL SH... <br><strong>BALSE</strong> waxaad nasiib u yeelatay inaad 10,000 ka qaadato kii kaa horeeyay! Isku geyn waa <strong>20,000 SL SH!</strong> Kkkk 😈" },
            { challenge: "Gacmaha kor u taag oo dheh 'Alhamdulillah', kadib fur! 🙌", prize: "Nasiib wacan! Waxaad heshay <strong>10,000 SL SH</strong>. Qanaacadaa ugu wacan, ciid wanaagsan! 🎈" },
            { challenge: "Dheh 'Ciid Mubaarak' cod dheer!, kadib fur! 🗣️", prize: "🎉 <strong>Aad baad u nasiib badantahay!</strong> Waxaad heshay bashqad qiimo badan! <br><br>Hadiyadaada lama sheegin, ee ila soo hadal sida ugu dhakhsaha badan si aad u hesho abaal marintaada qaaliga ah! 🎁🤫" },
            { challenge: "Saddex jeer saliga nabiga mari ﷺ, kadib fur! 📿", prize: "Hambalyo! Waxaad heshay <strong>20,000 SL SH!</strong> Waa dhexdhexaad wacan, ciid mubaarak! 🎊" },
            { challenge: "Hooyo gacanta ama madaxa ka dhunko, kadib taabo mar kale! ❤️", prize: "Nasiib wacan! Waxaad heshay <strong>10,000 SL SH</strong>. Yaanay ku yaraanin, niyadda wanaaji! 🌺" },
            { challenge: "Hal abuur yar samee ama gabay gaaban sheeg, kadib fur! 🎤", prize: "Hambalyo! Waxaad heshay <strong>15,000 SL SH</strong>. Ku ciid farxad iyo caafimaad! 🌙" },
            { challenge: "Salaan diiran sii qofka ku xiga ka hor intaanad furin! 🤗", prize: "Nasiib wacan! Waxaad heshay <strong>10,000 SL SH</strong>. Waa inoo ciida dambe iyo nasiib fiican! 😄" },
            { challenge: "Inyar dhoolacadee, kadib taabo mar kale! 😁", prize: "🎉 <strong>Aad baad u nasiib badantahay!</strong> Waxaad heshay bashqad qiimo badan! <br><br>Hadiyadaada lama sheegin, ee ila soo hadal sida ugu dhakhsaha badan si aad u hesho abaal marintaada qaaliga ah! 🎁🤫" }
        ];

        let boxStates = new Array(11).fill(0);

        function createBoard() {
            const board = document.getElementById('gameBoard');
            for (let i = 0; i < 11; i++) {
                let box = document.createElement('div');
                box.className = 'box';
                box.id = 'box-' + i;
                box.innerHTML = `<strong>Sanduuqa ${i + 1}</strong>`;
                box.onclick = () => handleBoxClick(i);
                board.appendChild(box);
            }
        }

        function handleBoxClick(index) {
            let state = boxStates[index];
            let boxElem = document.getElementById('box-' + index);

            if (state === 0) {
                // State 1: Shartiga
                boxElem.innerHTML = `${prizesData[index].challenge} <br><div class="small-text">(Taabo mar kale)</div>`;
                boxElem.className = 'box challenge-state';
                boxStates[index] = 1;
            } else if (state === 1) {
                // State 2: Lacagta iyo Rashka
                boxElem.innerHTML = prizesData[index].prize;
                boxElem.className = 'box opened';
                boxStates[index] = 2;

                // Rashka (Confetti)
                if (index === 5 || index === 10) {
                    // Rashka labada qof ee hadiyadda la qariyay
                    confetti({
                        particleCount: 200,
                        spread: 120,
                        origin: { y: 0.5 },
                        colors: ['#ff00ff', '#00ffff', '#ff0000', '#ffff00'] 
                    });
                } else {
                    // Rashka dadka caadiga ah
                    confetti({
                        particleCount: 100,
                        spread: 80,
                        origin: { y: 0.6 },
                        colors: ['#d4af37', '#2c5e3b', '#ffffff'] 
                    });
                }
            }
        }

        createBoard();
    </script>
</body>
</html>
