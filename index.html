<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xaqal Ciidka Qoyska - Ciid Mubaarak!</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at top center, #fffdf8, #f4ecd8);
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M54.627 0l.83.83-1.66 1.66-.83-.83.83-.83zM27.314 0l.83.83-1.66 1.66-.83-.83.83-.83z' fill='%23d4af37' fill-opacity='0.15' fill-rule='evenodd'/%3E%3C/svg%3E");
            color: #333;
            margin: 0;
            padding: 15px; 
            direction: ltr;
        }

        .page-wrapper {
            border: 6px double #d4af37;
            border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(212, 175, 55, 0.2), 0 0 15px rgba(212, 175, 55, 0.4);
            min-height: calc(100vh - 30px); 
            padding: 40px 20px;
            text-align: center;
            position: relative;
            background: rgba(255, 255, 255, 0.3); 
        }

        .page-wrapper::before, .page-wrapper::after {
            content: "✨";
            position: absolute;
            top: 15px;
            font-size: 24px;
            color: #d4af37;
        }
        .page-wrapper::before { left: 20px; }
        .page-wrapper::after { right: 20px; }

        h1 {
            color: #2c5e3b;
            font-size: 2.8em;
            margin-top: 0;
            margin-bottom: 5px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            user-select: none; 
        }
        .subtitle {
            color: #b8860b;
            font-size: 1.3em;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .mother-section {
            background: linear-gradient(135deg, #d4af37, #f9f1d8);
            border: 3px solid #b8962e;
            border-radius: 15px;
            padding: 20px;
            margin: 0 auto 40px auto;
            max-width: 600px;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }
        .mother-section:hover {
            transform: scale(1.03);
        }
        .mother-text {
            font-size: 1.6em;
            font-weight: bold;
            color: #2c5e3b;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
            padding-bottom: 20px;
        }
        .box {
            background: linear-gradient(135deg, #2c5e3b, #1e4028);
            color: white;
            border-radius: 12px;
            padding: 30px 20px;
            font-size: 1.2em;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: all 0.3s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            min-height: 120px;
            border: 2px solid #1e4028;
        }
        .box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .box.challenge-state {
            background: linear-gradient(135deg, #e67e22, #d35400);
            border: 2px solid #b84a00;
            transform: scale(1.05);
            box-shadow: 0 8px 16px rgba(230, 126, 34, 0.4);
        }
        .box.challenge-state:hover {
            transform: scale(1.05);
        }
        .box.opened {
            background: #e0e0e0;
            color: #444;
            cursor: default;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
            border: 2px solid #ccc;
            transform: none;
        }
        .box.opened:hover {
            transform: none;
            box-shadow: inset 0 3px 6px rgba(0,0,0,0.1);
        }
        .small-text {
            font-size: 0.8em;
            color: #ffd700;
            margin-top: 10px;
        }
        .challenge-state .small-text {
            color: #fff;
            font-weight: bold;
        }
        .opened .small-text {
            color: #666;
        }
        .fursad-text {
            color: #d35400;
            font-weight: bold;
            font-size: 0.9em;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="page-wrapper">
        <h1 onclick="resetGame()">🌙 CIID MUBAARAK! ✨</h1>
        <div class="subtitle">Soo dhawaada, maanta waa maalintii farxadda iyo xaqal ciidka, qof walba nasiib wacan! 🎈</div>

        <div class="mother-section" id="hooyoBox" onclick="openHooyo()">
            <div class="mother-text" id="hooyoContent">Hooyo Macaan ❤️ (Halkan taabo)</div>
        </div>

        <hr style="border: 1px dashed #d4af37; max-width: 800px; margin-bottom: 30px;">

        <div class="grid-container" id="gameBoard">
        </div>
    </div>

    <script>
        let boxStates = JSON.parse(localStorage.getItem('ciidGameState'));
        
        if (!boxStates || boxStates.length !== 13) {
            boxStates = new Array(13).fill(0);
        }

        let hooyoOpened = localStorage.getItem('hooyoState') === 'true';
        let resetCounter = 0; 

        function resetGame() {
            resetCounter++;
            if (resetCounter >= 3) {
                if (confirm("Ma hubtaa inaad dib u bilaabayso ciyaarta? (Tani waxay tirtiraysaa wixii horey loo furay)")) {
                    localStorage.removeItem('ciidGameState');
                    localStorage.removeItem('hooyoState');
                    location.reload(); 
                }
                resetCounter = 0;
            }
        }

        function saveGame() {
            localStorage.setItem('ciidGameState', JSON.stringify(boxStates));
            localStorage.setItem('hooyoState', hooyoOpened);
        }

        function renderHooyo() {
            if (hooyoOpened) {
                document.getElementById('hooyoContent').innerHTML = "✨ Ciid Mubaarak Hooyo Macaan! ✨<br><br>Adigu tartan kuma jirtid, xaqal ciidkaaguna waa diyaar. <br><br>Waan ku jecelahay Hooyo! ❤️";
            }
        }

        function openHooyo() {
            if (!hooyoOpened) {
                document.getElementById('hooyoContent').innerHTML = "✨ Ciid Mubaarak Hooyo Macaan! ✨<br><br>Adigu tartan kuma jirtid, xaqal ciidkaaguna waa diyaar. <br><br>Waan ku jecelahay Hooyo! ❤️";
                hooyoOpened = true;
                saveGame(); 
                
                confetti({
                    particleCount: 150,
                    spread: 100,
                    origin: { y: 0.6 },
                    colors: ['#d4af37', '#2c5e3b', '#ffffff']
                });
            }
